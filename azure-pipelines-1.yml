trigger: none

pool: Devpool

variables: 
- group: veer-kv-variable

stages:
  - stage: "StageI"
    jobs:
      - job: "Terraforminit"
        steps:
        - task: TerraformInstaller@1
          inputs:
            terraformVersion: 'latest'

        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            backendServiceArm: 'Pipeline-Energy-Service-Connection'
            backendAzureRmStorageAccountName: $(veer-storage-Name)
            backendAzureRmContainerName: 'vaayucontainer'
            backendAzureRmKey: 'key.tfstate'

        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'plan'
            commandOptions: '-var="vm_password=$(adminpassword)"'
            environmentServiceNameAzureRM: 'Pipeline-Energy-Service-Connection'

        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'apply'
            commandOptions: '-auto-approve -var="vm_password=$(adminpassword)"'
            environmentServiceNameAzureRM: 'Pipeline-Energy-Service-Connection'